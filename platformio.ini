[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	boschsensortec/BSEC Software Library@^1.8.1492
	adafruit/Adafruit SH110X@^2.1.14
	adafruit/Adafruit GFX Library@^1.12.3
	arduinogetstarted/ezButton@^1.0.6
	madhephaestus/ESP32Encoder@^0.11.8
